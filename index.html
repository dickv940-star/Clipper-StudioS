<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">


<title>
ClipperStudio AI Editor
</title>


<link rel="manifest"
href="manifest.json">


<link rel="icon"
href="assets/icon-192.png">


<meta name="theme-color"
content="#6c5ce7">



<style>

*{
box-sizing:border-box;
}


html,
body{

margin:0;

width:100%;

height:100%;

background:#090d18;

color:white;

font-family:

Arial,
sans-serif;

overflow:hidden;

}



#app{

width:100%;

height:100%;

display:flex;

flex-direction:column;

}



#page{

width:100%;

height:100%;

}



button{

cursor:pointer;

}



canvas{

max-width:100%;

}


</style>


</head>


<body>


<div id="app">


<div id="page">

Loading ClipperStudio...

</div>


</div>





<!-- =========================
CORE
========================= -->


<script src="js/router.js"></script>





<!-- =========================
STORAGE
========================= -->


<script src="js/project-storage.js"></script>





<!-- =========================
VIDEO
========================= -->


<script src="js/loader.js"></script>

<script src="js/player.js"></script>

<script src="js/metadata.js"></script>

<script src="js/thumbnail.js"></script>





<!-- =========================
AI ENGINE
========================= -->


<script src="js/scene-detector.js"></script>

<script src="js/motion-detector.js"></script>

<script src="js/face-detector.js"></script>

<script src="js/subtitle-engine.js"></script>

<script src="js/highlight-engine.js"></script>

<script src="js/autoframe.js"></script>

<script src="js/clip-generator.js"></script>

<script src="js/auto-editor.js"></script>

<script src="js/ranking.js"></script>

<script src="js/smart-cut.js"></script>





<!-- =========================
EDITOR
========================= -->


<script src="js/timeline.js"></script>

<script src="js/track.js"></script>

<script src="js/clip.js"></script>

<script src="js/marker.js"></script>

<script src="js/playhead.js"></script>

<script src="js/toolbar.js"></script>

<script src="js/trim.js"></script>

<script src="js/split.js"></script>

<script src="js/delete.js"></script>

<script src="js/undo.js"></script>

<script src="js/redo.js"></script>

<script src="js/preview.js"></script>

<script src="js/editor.js"></script>





<!-- =========================
AUDIO
========================= -->


<script src="js/audio-engine.js"></script>

<script src="js/music-manager.js"></script>

<script src="js/voice-over.js"></script>

<script src="js/sound-effect.js"></script>





<!-- =========================
SUBTITLE
========================= -->


<script src="js/subtitle-manager.js"></script>

<script src="js/subtitle-style.js"></script>

<script src="js/subtitle-renderer.js"></script>





<!-- =========================
EFFECT
========================= -->


<script src="js/effect-engine.js"></script>





<!-- =========================
RENDER ENGINE
========================= -->


<script src="js/render-engine.js"></script>

<script src="js/render-preview.js"></script>

<script src="js/preview-renderer.js"></script>

<script src="js/frame-renderer.js"></script>

<script src="js/transition-renderer.js"></script>

<script src="js/overlay-renderer.js"></script>

<script src="js/render-compositor.js"></script>

<script src="js/keyframe-engine.js"></script>

<script src="js/motion-engine.js"></script>

<script src="js/color-engine.js"></script>

<script src="js/lut-engine.js"></script>

<script src="js/shader-engine.js"></script>

<script src="js/render-worker.js"></script>

<script src="js/render-pipeline.js"></script>





<!-- =========================
EXPORT
========================= -->


<script src="js/format-manager.js"></script>

<script src="js/ffmpeg.js"></script>

<script src="js/encoder.js"></script>

<script src="js/quality-manager.js"></script>

<!-- =========================
PWA SUPPORT
========================= -->


<script src="js/offline.js"></script>

<script src="js/cache.js"></script>

<script src="js/install.js"></script>





<!-- =========================
APPLICATION START
========================= -->


<script src="js/app.js"></script>





<script>


if(
"serviceWorker" in navigator
){


window.addEventListener(

"load",

()=>{


navigator.serviceWorker.register(

"service-worker.js"

)

.then(()=>{


console.log(
"ClipperStudio PWA aktif"
);


})

.catch(

error=>{


console.error(

"Service Worker Error:",

error

);


});


}

);


}



</script>



</body>

</html>
