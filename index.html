<!DOCTYPE html>
<html lang="id">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <meta name="theme-color" content="#0f172a">

    <title>ClipperStudio</title>

    <link rel="manifest" href="manifest.json">

    <link rel="icon" href="assets/logo.png">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{

            background:#0f172a;

            color:#ffffff;

            font-family:Arial,Helvetica,sans-serif;

            display:flex;

            justify-content:center;

            align-items:center;

            min-height:100vh;

        }

        .container{

            width:100%;

            max-width:420px;

            padding:30px;

            text-align:center;

        }

        .logo{

            width:180px;

            height:180px;

            object-fit:contain;

            margin-bottom:30px;

        }

        h1{

            font-size:30px;

            margin-bottom:10px;

        }

        p{

            color:#94a3b8;

            margin-bottom:35px;

        }

        #videoInput{

            display:none;

        }

        #chooseFile{

            width:100%;

            padding:16px;

            border:none;

            border-radius:12px;

            background:#2563eb;

            color:white;

            font-size:16px;

            cursor:pointer;

            transition:.25s;

        }

        #chooseFile:hover{

            background:#1d4ed8;

        }

    </style>

</head>

<body>

    <div class="container">

        <img
            src="assets/logo.png"
            id="logo"
            class="logo"
            alt="Clipper Logo">

        <h1>ClipperStudio</h1>

        <p>

            Upload video untuk mulai membuat clip.

        </p>

        <input
            type="file"
            id="videoInput"
            accept="video/*">

        <button id="chooseFile">

            Choose Video

        </button>

    </div>

<script>

const input=document.getElementById("videoInput");

const button=document.getElementById("chooseFile");

button.onclick=()=>{

    input.click();

};

input.onchange=(e)=>{

    const file=e.target.files[0];

    if(!file) return;

    console.log(file);

    // nanti masuk ke halaman editor

};

if("serviceWorker" in navigator){

    window.addEventListener("load",()=>{

        navigator.serviceWorker.register("./sw.js");

    });

}

</script>

</body>

</html>
