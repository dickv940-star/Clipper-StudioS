<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>ClipperStudio</title>

<link
rel="stylesheet"
href="css/style.css">

</head>

<body>

<header>

<h1>ClipperStudio</h1>

<div class="toolbar">

<button id="uploadBtn">
Upload
</button>

<button id="autoClipBtn">
Auto Clip
</button>

<button id="exportBtn">
Export
</button>

</div>

</header>

<main>

<section id="uploadArea">

<input
type="file"
id="videoInput"
accept="video/*"
hidden>

<button id="chooseVideo">

Pilih Video

</button>

<p>

atau drag & drop video

</p>

</section>

<section id="previewArea">

<video
id="video"
controls>
</video>

</section>

<section id="timelinePanel">

    <div id="timelineToolbar">

        <button id="zoomOut">-</button>

        <span id="zoomLabel">100%</span>

        <button id="zoomIn">+</button>

    </div>

    <div id="timelineWrapper">

        <canvas id="timelineCanvas"></canvas>

        <div id="playhead"></div>

    </div>

</section>

</main>

<script
type="module"
src="js/app.js">
</script>

</body>
