<!DOCTYPE html>
<html lang="id">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>ClipperStudio</title>

    <link rel="stylesheet" href="css/style.css">

</head>

<body>

    <!-- ========================= -->
    <!-- HEADER -->
    <!-- ========================= -->

    <header>

        <div class="logo">

            <h2>🎬 ClipperStudio</h2>

        </div>

        <div class="toolbar">

            <button id="chooseVideo">
                Upload Video
            </button>

            <button id="autoClipBtn">
                Auto Clip
            </button>

            <button id="splitBtn">
                Split
            </button>

            <button id="deleteBtn">
                Delete
            </button>

            <button id="exportBtn">
                Export
            </button>

        </div>

    </header>

    <!-- ========================= -->
    <!-- MAIN -->
    <!-- ========================= -->

    <main>

        <!-- Upload Area -->

        <section id="uploadArea">

            <input
                type="file"
                id="videoInput"
                accept="video/*"
                hidden>

            <h2>Upload Video</h2>

            <p>

                Klik tombol Upload Video
                atau drag & drop file video.

            </p>

        </section>

        <!-- Preview -->

        <section id="previewArea">

            <video

                id="video"

                controls

                preload="metadata"

            ></video>

        </section>

        <!-- Timeline -->

        <section id="timelinePanel">

            <div id="timelineToolbar">

                <button id="zoomOut">−</button>

                <span id="zoomLabel">

                    100%

                </span>

                <button id="zoomIn">+</button>

            </div>

            <div id="timelineWrapper">

                <canvas
                    id="timelineCanvas">
                </canvas>

                <div id="playhead"></div>

            </div>

        </section>

    </main>

    <!-- ========================= -->
    <!-- FOOTER -->
    <!-- ========================= -->

    <footer>

        <p>

            ClipperStudio V1

        </p>

    </footer>

    <!-- ========================= -->
    <!-- APP -->
    <!-- ========================= -->

    <script
        type="module"
        src="js/app.js">
    </script>

</body>

</html>
