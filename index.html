<!DOCTYPE html>
<html lang="id">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <meta name="theme-color" content="#0f172a">

    <title>ClipperStudio</title>

    <link rel="manifest" href="manifest.json">

    <link rel="icon" href="assets/logo.png">
    
    <link rel="stylesheet" href="css/style.css">
    
  
</head>

<body>

<div id="homeScreen" class="screen active">

    <div class="container">

        <img
            src="assets/logo.png"
            class="logo"
            alt="Logo">

        <h1>ClipperStudio</h1>

        <p>

            Upload video untuk mulai membuat clip.

        </p>

        <input
            type="file"
            id="videoInput"
            accept="video/*"
            hidden>

        <button id="chooseFile">

            Choose Video

        </button>

    </div>

</div>


<div id="modeScreen" class="screen">

    <div class="container">

        <img
            src="assets/logo.png"
            class="logo"
            alt="Logo">

        <h1>

            Video Loaded

        </h1>

        <p>

            Pilih mode pengeditan

        </p>

        <button
            id="autoClipBtn"
            class="menuButton">

            Auto Clips

        </button>

        <button
            id="manualBtn"
            class="menuButton">

            Edit Manual

        </button>

    </div>

</div>

<script src="js/app.js"></script>

</body>

</html>
