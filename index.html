<!DOCTYPE html>
<html lang="id">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <meta name="theme-color" content="#0f172a">

    <title>ClipperStudio</title>

    <link rel="manifest" href="manifest.json">

    <link rel="icon" href="assets/logo.png">
    
    <link rel="stylesheet" href="css/style.css">
    
  
</head>

<body>

    <div class="container">

        <img
            src="assets/logo.png"
            id="logo"
            class="logo"
            alt="Clipper Logo">

        <h1>ClipperStudio</h1>

        <p>

            Upload video untuk mulai membuat clip.

        </p>

        <input
            type="file"
            id="videoInput"
            accept="video/*">

        <button id="chooseFile">

            Choose Video

        </button>

    </div>

<script>

const input=document.getElementById("videoInput");

const button=document.getElementById("chooseFile");

button.onclick=()=>{

    input.click();

};

input.onchange=(e)=>{

    const file=e.target.files[0];

    if(!file) return;

    console.log(file);

    // nanti masuk ke halaman editor

};

if("serviceWorker" in navigator){

    window.addEventListener("load",()=>{

        navigator.serviceWorker.register("./sw.js");

    });

}

</script>

</body>

</html>
